name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z release tag to retry
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release-please
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release-please.outputs.release_created == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}

      - name: Load current release tooling for retry
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: git restore --source "${GITHUB_SHA}" -- scripts/publish-packages.mjs

      - uses: pnpm/action-setup@v6
        with:
          # pnpm 10.34 includes npm trusted-publishing support when setup-node
          # creates an auth-token placeholder without NODE_AUTH_TOKEN.
          version: 10.34.5

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install npm with trusted-publishing support
        run: npm install --global npm@12.0.1

      - name: Require a version-matching release tag
        run: |
          set -euo pipefail
          VERSION=$(node -p "require('./package.json').version")
          TAG=$(git describe --tags --exact-match HEAD)
          if [ "${TAG}" != "v${VERSION}" ]; then
            echo "Expected tag v${VERSION} at HEAD, found ${TAG}"
            exit 1
          fi

      - run: pnpm install --frozen-lockfile --filter './packages/**'
      - run: pnpm -r --filter './packages/**' typecheck
      - run: pnpm -r --filter './packages/**' test
      - run: pnpm -r --filter './packages/**' build

      - name: Publish lockstep package train
        env:
          NPM_CONFIG_PROVENANCE: true
        run: node scripts/publish-packages.mjs
